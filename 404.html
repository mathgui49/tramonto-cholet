<!doctype html>
<html lang="fr-FR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#f6ecd9" />
    <meta name="color-scheme" content="light dark" />
    <script>
      try {
        var t = localStorage.getItem("tramonto-theme");
        if (t === "dark") document.documentElement.setAttribute("data-theme", "dark");
      } catch (e) {}
    </script>
    <title>Page introuvable · Tramonto</title>
    <meta name="robots" content="noindex" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css?v=20260425d" />
    <style>
      .nf {
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 80px 24px;
        background:
          radial-gradient(circle at 50% 30%, rgba(255, 138, 61, 0.18) 0%, transparent 55%),
          var(--c-paper);
      }
      .nf__inner { max-width: 560px; }
      .nf__sun {
        width: 96px;
        height: 96px;
        margin: 0 auto 24px;
        border-radius: 50%;
        background: var(--grad-sunset);
        box-shadow: 0 30px 80px rgba(255, 138, 61, 0.4);
        animation: pizzaFloat 6s ease-in-out infinite;
      }
      .nf__code {
        font-family: var(--font-display);
        font-size: clamp(4rem, 14vw, 8rem);
        line-height: 1;
        letter-spacing: 0.04em;
        background: var(--grad-sunset);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        margin: 0;
      }
      .nf h1 {
        font-family: var(--font-display);
        font-size: clamp(1.6rem, 3.6vw, 2.4rem);
        margin: 12px 0 16px;
      }
      .nf p { color: var(--c-ink-soft); font-size: 1.05rem; margin: 0 0 28px; }
      .nf__actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    </style>
  </head>
  <body>
    <div class="tricolor" aria-hidden="true"></div>
    <main class="nf">
      <div class="nf__inner">
        <div class="nf__sun" aria-hidden="true"></div>
        <p class="nf__code">404</p>
        <h1>Cette page s'est égarée dans le four.</h1>
        <p>
          Pas de panique — la pâte est toujours en train de lever.
          Retour à la maison ou direction la carte ?
        </p>
        <div class="nf__actions">
          <a class="btn btn--primary btn--lg" href="/">Retour à l'accueil</a>
          <a class="btn btn--ghost btn--lg" href="/#menu">Voir la carte</a>
        </div>
      </div>
    </main>
  </body>
</html>
